<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수신거부 - 소셜비즈</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif; background:#f4f4f4; color:#333; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.1); padding:50px 40px; text-align:center; max-width:480px; margin:20px; }
  .card h1 { font-size:24px; font-weight:700; margin-bottom:12px; }
  .card p { color:#666; font-size:15px; line-height:1.7; margin-bottom:24px; }
  .email-display { background:#f8f8f8; border-radius:8px; padding:12px 20px; font-size:15px; color:#333; font-weight:600; margin-bottom:24px; word-break:break-all; }
  .btn { display:inline-block; background:#e53e3e; color:#fff; text-decoration:none; padding:14px 32px; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; }
  .btn:hover { opacity:0.9; }
  .success { display:none; }
  .success h1 { color:#38a169; }
  .footer { margin-top:20px; color:#999; font-size:12px; }
</style>
</head>
<body>

<div class="card">
  <!-- 수신거부 확인 -->
  <div id="confirmArea">
    <h1>수신거부</h1>
    <p>아래 이메일 주소의 수신을 거부하시겠습니까?</p>
    <div class="email-display" id="emailDisplay">-</div>
    <form id="unsubForm" action="https://formsubmit.co/yonghwan.kim@nhndata.com" method="POST">
      <input type="hidden" name="_subject" value="[수신거부] 수신거부 요청">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" id="nextUrl">
      <input type="hidden" name="요청" value="수신거부">
      <input type="hidden" name="이메일" id="emailInput">
      <input type="text" name="_honey" style="display:none">
      <button type="submit" class="btn">수신거부 하기</button>
    </form>
  </div>

  <!-- 완료 메시지 -->
  <div id="successArea" class="success">
    <h1>수신거부 완료</h1>
    <p>더 이상 메일이 발송되지 않습니다.<br>감사합니다.</p>
  </div>
</div>

<div class="footer">NHN DATA 소셜비즈</div>

<script>
var params = new URLSearchParams(window.location.search);
var email = params.get('email') || '';
var done = params.get('done');

if (done) {
  document.getElementById('confirmArea').style.display = 'none';
  document.getElementById('successArea').style.display = 'block';
} else if (email) {
  document.getElementById('emailDisplay').textContent = email;
  document.getElementById('emailInput').value = email;
  document.getElementById('nextUrl').value = window.location.origin + window.location.pathname + '?done=1';
} else {
  document.getElementById('emailDisplay').textContent = '이메일 정보가 없습니다.';
  document.querySelector('.btn').style.display = 'none';
}
</script>

</body>
</html>
