<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수신거부 완료 - 소셜비즈</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif; background:#f4f4f4; color:#333; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.1); padding:50px 40px; text-align:center; max-width:480px; margin:20px; }
  .card h1 { color:#38a169; font-size:24px; font-weight:700; margin-bottom:12px; }
  .card p { color:#666; font-size:15px; line-height:1.7; }
  .email-display { background:#f8f8f8; border-radius:8px; padding:12px 20px; font-size:15px; color:#333; font-weight:600; margin:16px 0 20px; word-break:break-all; }
  .footer { margin-top:20px; color:#999; font-size:12px; }
</style>
</head>
<body>

<div class="card">
  <h1>수신거부 완료</h1>
  <div class="email-display" id="emailDisplay"></div>
  <p>위 이메일로 더 이상 메일이 발송되지 않습니다.<br>감사합니다.</p>
</div>

<div class="footer">NHN DATA 소셜비즈</div>

<script>
var params = new URLSearchParams(window.location.search);
var email = params.get('email') || '';
document.getElementById('emailDisplay').textContent = email || '(이메일 정보 없음)';

if (email) {
  // 자동으로 수신거부 알림 전송
  var form = new FormData();
  form.append('이메일', email);
  form.append('요청', '수신거부');
  form.append('_subject', '[수신거부] ' + email);
  form.append('_template', 'table');
  form.append('_captcha', 'false');

  fetch('https://formsubmit.co/ajax/yonghwan.kim@nhndata.com', {
    method: 'POST',
    body: form,
    headers: { 'Accept': 'application/json' }
  });
}
</script>

</body>
</html>
